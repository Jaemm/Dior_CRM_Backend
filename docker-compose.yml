# docker-compose.yml (utilizing .env file)
version: '3.8'
services:
    crm_api:
        build:
            dockerfile: Dockerfile
            context: .
            args:
                - NODE_VERSION=${NODE_VERSION}
            # Only will build development stage from our dockerfile
            target: ${NODE_ENV}
        ports:
            - '2024:2024'
        environment:
            - NODE_ENV=${NODE_ENV}
            - SSL:${SSL}
            - SSL_KEY_PATH=${SSL_KEY_PATH}
            - SSL_KEY_PATH:${SSL_KEY_PATH}
            - SSL_CERT_PATH:${SSL_CERT_PATH}
            - POSTGRES_PORT=${POSTGRES_PORT}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
            - EMAIL_HOST=${EMAIL_HOST}
            - EMAIL_USER=${EMAIL_USER}
            - EMAIL_PASSWORD=${EMAIL_PASSWORD}
            - APP_ID=${APP_ID}
            - JWT_CONFIRMATION_TIME=${JWT_CONFIRMATION_TIME}
            - JWT_RESET_PASSWORD_SECRET=${JWT_RESET_PASSWORD_SECRET}
            - JWT_RESET_PASSWORD_TIME=${JWT_RESET_PASSWORD_TIME}
            - DOMAIN=${DOMAIN}
            - REDIS_HOST=${REDIS_HOST}
            - REDIS_PORT=${REDIS_PORT}
            - AWS_REGION=${AWS_REGION}
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
        volumes:
            - ./:/app
            - /app/node_modules
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf
            - ./nginx/sites-enabled/test:/etc/nginx/sites-enabled/test
            - ./nginx/sites-enabled/geo-test:/etc/nginx/sites-enabled/geo-test
            - ./nginx/error.log:/etc/nginx/error_log.log
            - /etc/letsencrypt/:/etc/letsencrypt/:ro
            - /etc/letsencrypt/live/test.chowis.cloud:/etc/letsencrypt/live/test.chowis.cloud:ro
            - /etc/letsencrypt/live/geo-test.chowis.cloud:/etc/letsencrypt/live/geo-test.chowis.cloud:ro

            # geo-test.chowis.cloud
        # env_file:
        # - ./.env
        depends_on:
            # - redis
            - postgres
            - nginx

    # redis:
    #   image: redis
    #   ports:
    #     - 6379:6379
    #   volumes:
    #     - redis:/data

    postgres:
        image: postgres:alpine
        restart: always
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - 5433
        volumes:
            - docker-nest-postgres:/var/lib/postgresql/data

    # WEB server
    nginx:
        restart: always
        # image: nginx:alpine
        build:
            context: ./nginx
        ports:
            - 80
            - 443
        volumes:
            - ./:/app
            - /app/node_modules
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf
            - ./nginx/sites-enabled/test:/etc/nginx/sites-enabled/test
            - ./nginx/sites-enabled/geo-test:/etc/nginx/sites-enabled/geo-test
            - ./nginx/error.log:/etc/nginx/error_log.log
            - /etc/letsencrypt/:/etc/letsencrypt/:ro
            - /etc/letsencrypt/live/test.chowis.cloud:/etc/letsencrypt/live/test.chowis.cloud:ro
            - /etc/letsencrypt/live/geo-test.chowis.cloud:/etc/letsencrypt/live/geo-test.chowis.cloud:ro

        # depends_on:
        #   - crm_api
        networks:
            - app-network

    # certbot:
    #   image: certbot/certbot
    #   container_name: certbot
    #   volumes:
    #     - certbot-etc:/etc/letsencrypt
    #     - certbot-var:/var/lib/letsencrypt
    #     - web-root:/var/www/html
    #   depends_on:
    #     - nginx
    #   command: certonly --webroot --webroot-path=/var/www/html --email paul@chowis.com --agree-tos --no-eff-email --staging -d geo-test.chowis.cloud

volumes:
    docker-nest-postgres:

networks:
    app-network:
        driver: bridge
