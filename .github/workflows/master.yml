# PRODUTION RELEASE SCRIPT
name: Production Release
on:
    push:
        branches: [main]
# Changing to main
jobs:
    build:
        runs-on: [ubuntu-latest]

        if: (github.ref == 'refs/heads/main')
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Set up SSH
              uses: webfactory/ssh-agent@v0.5.3
              with:
                  ssh-private-key: ${{ secrets.CHOWIS_SSH_KEY }}

            - name: SSH into server and run sync.sh
              run: |
                  ssh -o StrictHostKeyChecking=no -T -i <(echo "${{ secrets.CHOWIS_SSH_KEY }}") ubuntu@13.36.54.183 << EOF
                    cd /home/ubuntu/repositories/BE_dior_v2_crm/

                    if git status --porcelain | grep .; then
                      echo "Working directory is not clean, commit changes"
                      git add .
                      git commit -m "Committing changes before pulling from remote"
                    fi

                    git pull origin main
                    sudo bash -s < /home/ubuntu/repositories/BE_dior_v2_crm/sync.sh
                  EOF

    # Europe server
    cleanup-action:
        runs-on: [ubuntu-latest]
        needs: build
        continue-on-error: true
        steps:
            - name: Cleaning existing Actions
              run: |
                  echo "Removing old workflow runs..."
                  RUNS=$(curl -s -X GET -G "https://api.github.com/repos/${{ github.repository }}/actions/runs" \
                          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                          -H "Accept: application/vnd.github.v3+json" \
                          | jq -r '.workflow_runs[] | select(.id != ${{ github.run_id }}) | .id')

                  for run in $RUNS; do
                    echo "Deleting workflow run $run"
                    curl -X DELETE -G "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run" \
                      -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                      -H "Accept: application/vnd.github.v3+json"
                  done

            # sudo docker run -d -p 2024:2024 --name test-container-container chowisbackend/test-container:latest
            # sudo docker pull chowisbackend/test-container:latest
            # certbot certonly --dns-google --agree-tos \ -d "*.example.com"git
